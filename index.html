  <title>Plataforma Aprenda+ — Cursos</title>
  <style>
    :root{
      --primary:#0a84ff;
      --bg:#f7f9fc;
      --card:#fff;
      --muted:#64748b;
      --shadow:0 6px 18px rgba(10,20,40,0.08);
      --radius:12px;
    }
    *{box-sizing:border-box}
    body{
      font-family:'Open Sans', Arial, sans-serif;
      margin:0;
      background:linear-gradient(180deg,var(--bg),#ffffff);
      color:#0f1724;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:18px 28px;
    }
    .brand{display:flex;gap:12px;align-items:center;cursor:pointer}
    .logo{
      width:52px;height:52px;border-radius:10px;background:var(--primary);
      display:grid;place-items:center;color:#fff;font-weight:700;font-family:Poppins;
    }
    main{padding:20px;max-width:1100px;margin:0 auto;}
    .hero h1{font-family:'Poppins',sans-serif;font-size:26px;margin:6px 0}
    .hero p{color:var(--muted);margin:0}
    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:18px;
      margin-top:22px;
    }
    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:var(--shadow);
      transition:transform .18s,box-shadow .18s;
      cursor:pointer;
    }
    .card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(10,20,40,0.12)}
    .card h3{margin:6px 0 4px;font-size:18px}
    .card p{color:var(--muted);font-size:14px;margin:0}
    .btn{
      display:inline-block;background:linear-gradient(90deg,var(--primary),#0066ff);
      color:#fff;text-decoration:none;padding:9px 14px;border-radius:10px;font-weight:600;
      margin-top:12px;cursor:pointer;border:none;
    }
    .btn.secondary{background:transparent;color:var(--primary);border:1px solid rgba(10,132,255,0.12)}
    section.course{
      display:none;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
      padding:18px;margin-top:18px;
    }
    .levels{display:grid;gap:12px;margin-top:12px}
    .level{background:#fbfdff;border-radius:10px;padding:12px;border:1px solid rgba(10,20,40,0.03)}
    .visual { margin-top:12px; display:flex; gap:12px; flex-wrap:wrap; align-items:flex-start; }
    canvas { border-radius:10px; background:linear-gradient(180deg, #fff, #f8fbff); box-shadow:0 6px 18px rgba(10,20,40,0.02); }
    .quiz{margin-top:16px}
    .question-box{padding:12px;border-radius:10px;background:#ffffff;border:1px solid rgba(10,20,40,0.04)}
    .options{display:grid;gap:8px;margin-top:10px}
    .option-btn{
      padding:10px 12px;border-radius:8px;border:1px solid rgba(10,20,40,0.06);
      background:transparent;cursor:pointer;text-align:left;
    }
    .option-btn.selected{outline:3px solid rgba(10,132,255,0.12)}
    .progress{font-size:13px;color:var(--muted);margin-top:8px}
    footer{padding:22px;text-align:center;color:var(--muted);margin-top:18px}
    @media (max-width:700px){
      header{padding:14px}
      .cards{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
      .visual{flex-direction:column}
    }
  </style>
</head>

  content:{
    basic:`
Funções no dia a dia: previsão de gastos, temperatura, velocidade e crescimento.
Uma função associa cada valor de entrada (x) a um único valor de saída (f(x)).
Exemplo: f(x)=2x+1 cresce de forma constante — a cada 1 unidade em x, a saída aumenta 2.
Tipos comuns:
• Funções lineares (reta)
• Funções quadráticas (parábolas)
• Funções exponenciais (crescimento rápido)
`,
    
    intermediate:`
Funções lineares e quadráticas em profundidade:
• Linear: f(x)=ax+b → a é inclinação, b é intercepto.
• Quadrática: f(x)=ax²+bx+c → gráfico é uma parábola.
Vértice: ponto máximo ou mínimo da parábola.
Vértice = (-b/2a, f(-b/2a)).
Interceptos:
• Com y → f(0)
• Com x → resolver ax²+bx+c=0.
Comparação de gráficos: como inclinação, abertura e concavidade mudam modelos reais.
`,

    advanced:`
Derivadas: a ferramenta para medir variações.
A derivada de f(x) mede o quanto a função muda quando x muda.
Regras importantes:
• d/dx(xⁿ)=n·xⁿ⁻¹
• d/dx(c)=0
• Derivada de somas: derivar termo a termo.
Aplicações:
• Crescimento máximo/mínimo: f'(x)=0 → ponto crítico.
• Otimização: custo mínimo, lucro máximo, rotas eficientes.
• Velocidade instantânea: derivada da posição no tempo.
`
  }

/* ====== QUIZ: RENDER + LÓGICA (mesma lógica que você tinha) ====== */
function initQuiz(courseId){
  const quizData = quizzes[courseId];
  const container = document.getElementById(`${courseId}-quiz-box`);
  if(!quizData || !container){
    if(container) container.innerHTML = '<p>Sem quiz disponível.</p>';
    return;
  }

  let index = 0;
  const answers = new Array(quizData.length).fill(null);

  function renderQuestion(){
    const q = quizData[index];
    container.innerHTML = `
      <div class="question-box">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <strong>Questão ${index+1} de ${quizData.length}</strong>
          <div class="progress">Progresso: ${index+1}/${quizData.length}</div>
        </div>
        <p style="margin-top:10px">${q.q}</p>
        <div class="options" id="options-${courseId}">
          ${q.options.map((opt,i)=>`<button class="option-btn" data-i="${i}">${String.fromCharCode(65+i)}. ${opt}</button>`).join('')}
        </div>
        <div style="margin-top:12px;display:flex;gap:8px">
          <button class="btn" id="next-${courseId}">${ index === quizData.length-1 ? 'Finalizar' : 'Próxima' }</button>
          <button class="btn secondary" id="skip-${courseId}">Pular</button>
        </div>
      </div>
      <div style="margin-top:10px;color:var(--muted);font-size:13px">Dica: pense no conceito antes de escolher — após finalizar você verá seu resultado.</div>
    `;
    const opts = document.querySelectorAll(`#options-${courseId} .option-btn`);
    opts.forEach(btn=>{
      btn.addEventListener('click',()=>{
        opts.forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
        answers[index] = Number(btn.dataset.i);
      });
    });
    document.getElementById(`next-${courseId}`).onclick = ()=> {
      if(answers[index] === null){
        if(!confirm('Você não escolheu uma opção. Deseja pular esta questão?')) return;
      }
      if(index < quizData.length - 1){
        index++; renderQuestion();
      } else {
        showResult();
      }
    };
    document.getElementById(`skip-${courseId}`).onclick = ()=> {
      if(index < quizData.length - 1){ index++; renderQuestion(); } else showResult();
    };
    if(answers[index] !== null){
      const pre = document.querySelector(`#options-${courseId} .option-btn[data-i="${answers[index]}"]`);
      if(pre) pre.classList.add('selected');
    }
  }

  function showResult(){
    let correctCount=0;
    let reviewHtml = '';
    quizData.forEach((q,i)=>{
      const user = answers[i];
      const isCorrect = user === q.correct;
      if(isCorrect) correctCount++;
      reviewHtml += `
        <div style="margin-bottom:10px;padding:10px;border-radius:8px;background:#fff;border:1px solid rgba(10,20,40,0.04)">
          <strong>Q${i+1}:</strong> ${q.q} <br>
          <em>Sua resposta:</em> ${ user===null ? '<span style="color:#999">Não respondeu</span>' : q.options[user] } <br>
          <em>Resposta correta:</em> ${q.options[q.correct]} ${ isCorrect ? '✅' : '❌' } <br>
          <small style="color:var(--muted)">${q.explanation || ''}</small>
        </div>
      `;
    });
    container.innerHTML = `
      <div style="padding:12px;background:#fff;border-radius:10px;border:1px solid rgba(10,20,40,0.04)">
        <h3>Resultado: ${correctCount} / ${quizData.length}</h3>
        <p style="color:var(--muted)">Percentual: ${Math.round((correctCount/quizData.length)*100)}%</p>
        <div style="margin-top:12px">
          <button class="btn" id="retry-${courseId}">Refazer Quiz</button>
          <button class="btn secondary" id="review-${courseId}" style="margin-left:8px">Ver respostas</button>
          <button class="btn secondary" id="home-${courseId}" style="margin-left:8px">Voltar ao curso</button>
        </div>
      </div>
      <div id="${courseId}-review" style="margin-top:12px;display:none">${reviewHtml}</div>
    `;
    document.getElementById(`retry-${courseId}`).onclick = ()=> initQuiz(courseId);
    document.getElementById(`review-${courseId}`).onclick = ()=> {
      const r = document.getElementById(`${courseId}-review`);
      r.style.display = r.style.display === 'none' ? 'block' : 'none';
    };
    document.getElementById(`home-${courseId}`).onclick = ()=> {
      document.querySelector('.course').scrollIntoView({behavior:'smooth'});
    };
  }

  renderQuestion();
}

/* ====== Função para voltar ao início ====== */
function showHome(){
  courseContainer.innerHTML='';
  home.style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
function runDev() {
  const textArea = document.getElementById('code-dev');
  const iframe = document.getElementById('output-dev');
  if (!textArea || !iframe) return;

  const code = textArea.value;
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(code);
  doc.close();
}
