  <style>
    :root{
      --primary:#0a84ff;
      --bg:#f7f9fc;
      --card:#fff;
      --muted:#64748b;
      --shadow:0 6px 18px rgba(10,20,40,0.08);
      --radius:12px;
    }
    *{box-sizing:border-box}
    body{
      font-family:'Open Sans', Arial, sans-serif;
      margin:0;
      background:linear-gradient(180deg,var(--bg),#ffffff);
      color:#0f1724;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:18px 28px;
    }
    .brand{display:flex;gap:12px;align-items:center;cursor:pointer}
    .logo{
      width:52px;height:52px;border-radius:10px;background:var(--primary);
      display:grid;place-items:center;color:#fff;font-weight:700;font-family:Poppins;
    }
    main{padding:20px;max-width:1100px;margin:0 auto;}
    .hero h1{font-family:'Poppins',sans-serif;font-size:26px;margin:6px 0}
    .hero p{color:var(--muted);margin:0}
    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:18px;
      margin-top:22px;
    }
    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:var(--shadow);
      transition:transform .18s,box-shadow .18s;
      cursor:pointer;
    }
    .card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(10,20,40,0.12)}
    .card h3{margin:6px 0 4px;font-size:18px}
    .card p{color:var(--muted);font-size:14px;margin:0}
    .btn{
      display:inline-block;background:linear-gradient(90deg,var(--primary),#0066ff);
      color:#fff;text-decoration:none;padding:9px 14px;border-radius:10px;font-weight:600;
      margin-top:12px;cursor:pointer;border:none;
    }
    .btn.secondary{background:transparent;color:var(--primary);border:1px solid rgba(10,132,255,0.12)}
    section.course{
      display:none;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
      padding:18px;margin-top:18px;
    }
    .levels{display:grid;gap:12px;margin-top:12px}
    .level{background:#fbfdff;border-radius:10px;padding:12px;border:1px solid rgba(10,20,40,0.03)}
    .visual { margin-top:12px; display:flex; gap:12px; flex-wrap:wrap; align-items:flex-start; }
    canvas { border-radius:10px; background:linear-gradient(180deg, #fff, #f8fbff); box-shadow:0 6px 18px rgba(10,20,40,0.02); }
    .quiz{margin-top:16px}
    .question-box{padding:12px;border-radius:10px;background:#ffffff;border:1px solid rgba(10,20,40,0.04)}
    .options{display:grid;gap:8px;margin-top:10px}
    .option-btn{
      padding:10px 12px;border-radius:8px;border:1px solid rgba(10,20,40,0.06);
      background:transparent;cursor:pointer;text-align:left;
    }
    .option-btn.selected{outline:3px solid rgba(10,132,255,0.12)}
    .progress{font-size:13px;color:var(--muted);margin-top:8px}
    footer{padding:22px;text-align:center;color:var(--muted);margin-top:18px}
    @media (max-width:700px){
      header{padding:14px}
      .cards{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
      .visual{flex-direction:column}
    }
  </style>
</head>

function openCourse(id) {
  const course = courses.find(x => x.id === id);
  if (!course) return;

  home.style.display = 'none';

  // VERIFICAÇÃO: O curso tem matérias (topics)?
  if (course.topics && course.topics.length > 0) {
    // Se tiver, mostra o Menu de Matérias
    courseContainer.innerHTML = `
      <div class="course-menu">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2>${course.title} - Matérias</h2>
          <button class="btn secondary" onclick="showHome()">← Voltar</button>
        </div>
        <div class="cards">
          ${course.topics.map(topic => `
            <div class="card" onclick="openTopic('${course.id}', '${topic.id}')">
              <div style="font-weight:700; color:var(--primary); margin-bottom:5px;">Módulo</div>
              <h3>${topic.title}</h3>
              <p>Clique para iniciar este conteúdo prático.</p>
              <button class="btn" style="padding:5px 10px; font-size:12px;">Estudar</button>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } else {
    // Se não tiver tópicos, abre como um curso simples (legado)
    openTopic(id, null); 
  }
}

function openTopic(courseId, topicId) {
  const course = courses.find(c => c.id === courseId);
  if (!course) return;

  let contentData;
  let backAction;

  // 1. Lógica do botão Voltar Dinâmico
  if (topicId && course.topics) {
    // Se estou dentro de uma matéria, o "Voltar" me leva para o menu de matérias do curso
    contentData = course.topics.find(t => t.id === topicId);
    backAction = `openCourse('${courseId}')`;
  } else {
    // Se o curso não tem matérias separadas, o "Voltar" me leva para a Home
    contentData = course;
    backAction = `showHome()`;
  }

  // 2. Preparação do Editor (Programação)
  // Prepara o Editor (Programação)
  let editorHtml = '';
  if (courseId === 'desenvolvimento' || courseId === 'python' || courseId === 'banco-de-dados' || courseId === 'java') {
    
    let placeholder = ""; // Declarada apenas UMA vez

    if (courseId === 'java') {
        placeholder = `public class Main {
    public static void main(String[] args) {
        String nome = "Felipe";
        int idade = 20;
        System.out.println("Olá, meu nome é " + nome);
        if (idade >= 18) {
            System.out.println("Status: Maior de idade");
        }
    }
}`;
    } else if (courseId === 'banco-de-dados') {
        placeholder = `-- Exemplo de Banco de Dados (SQL)
CREATE TABLE alunos (id INT, nome TEXT);
INSERT INTO alunos VALUES (1, 'Felipe');
SELECT * FROM alunos;`;
    } else if (courseId === 'python') {
        placeholder = `# Este é um comentário: Exibindo Olá Mundo
print("Olá, Mundo!")
`;
    } else if (courseId === 'desenvolvimento') {
        placeholder = `<!DOCTYPE html>
<html>
<head>
    <style>body { font-family: sans-serif; text-align: center; }</style>
</head>
<body>
    <h1>Olá Mundo!</h1>
    <button onclick="alert('Funciona!')">Clique aqui</button>
</body>
</html>`;
    }

    editorHtml = `
      <div class="level" style="background: #1e1e1e; color: white;">
        <h3>💻 Prática Interativa</h3>
        <textarea id="code-input" rows="10" style="width:100%; font-family:monospace; background:#2d2d2d; color:#9cdcfe; border:none; padding:10px; border-radius:8px;">${placeholder}</textarea>
        <button class="btn" onclick="runCode('${courseId}')" style="margin-top:10px;">⚡ Executar</button>
        <iframe id="output-frame" style="width:100%; height:200px; background:white; margin-top:10px; border-radius:8px; border:none;"></iframe>
      </div>`;
  }
  // 3. Renderização do HTML
  // Note que o ID do quiz agora tenta usar o topicId primeiro, se não existir usa o courseId
  const quizTargetId = topicId || courseId;

  // 1. Montagem do HTML com verificações de segurança
  courseContainer.innerHTML = `
    <section class="course" style="display:block">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
        <h1>${contentData.title}</h1>
        <button class="btn secondary" onclick="${backAction}">← Voltar</button>
      </div>

      <div class="levels">
        <div class="level">
            <h3>🔹 Básico</h3>
            <p>${contentData.content.basic || contentData.content}</p> 
        </div>
        
        ${editorHtml}

        ${contentData.content.intermediate ? `
          <div class="level"><h3>🔸 Intermediário</h3><p>${contentData.content.intermediate}</p></div>
          <div class="level"><h3>🔺 Avançado</h3><p>${contentData.content.advanced}</p></div>
        ` : ''}
      </div>

      <div class="quiz" id="${quizTargetId}-quiz" style="margin-top:30px; border-top:1px solid #eee; padding-top:20px;">
        <h3>🧩 Teste seu conhecimento</h3>
        <div id="${quizTargetId}-quiz-box">
            </div>
      </div>
    </section>
  `;

  // 2. A PARTE QUE FALTA: Chamar a função para carregar o quiz na caixa que acabamos de criar
  if (typeof openQuiz === 'function') {
      // Usamos um pequeno delay para garantir que o navegador já desenhou a caixa acima
      setTimeout(() => {
          renderQuizInsideBox(courseId, quizTargetId);
      }, 100);
  }

  // 4. Inicialização de Funções Extras
  setTimeout(() => {
    if (editorHtml) runCode(courseId);
    // Tenta carregar o quiz para a matéria específica ou para o curso geral
    initQuiz(quizTargetId);
  }, 50);
}

function runDev() {
  const textArea = document.getElementById('code-dev');
  const iframe = document.getElementById('output-dev');
  if (!textArea || !iframe) return;

  const code = textArea.value;
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(code);
  doc.close();
}
    
    function runCode(id) {
  const code = document.getElementById('code-input').value;
  const iframe = document.getElementById('output-frame');
  const doc = iframe.contentDocument || iframe.contentWindow.document;

  if (id === 'desenvolvimento') {
    const blob = new Blob([code], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    iframe.src = url;
    iframe.onload = () => URL.revokeObjectURL(url);

  } else if (id === 'python') {
    let output = "";
    const lines = code.split('\n');
    try {
      lines.forEach(line => {
        let l = line.trim();
        if (!l || l.startsWith('#')) return;
        if (l.startsWith('print(')) {
          let content = l.match(/\((.*)\)/)[1];
          output += `> ${content.replace(/['"]/g, '')}<br>`;
        }
      });
    } catch (e) { output = `<span style="color:red;">Erro: ${e.message}</span>`; }
    
    doc.open();
    doc.write(`<body style="font-family:monospace; padding:15px; background:#1e1e1e; color:#dcdcdc;">
      <div style="color:#569cd6; border-bottom:1px solid #333; margin-bottom:10px;"># Console Python</div>
      ${output || "> Código executado."}</body>`);
    doc.close();

  } else if (id === 'banco-de-dados') {
    let output = "";
    try {
      const commands = code.split(';');
      commands.forEach(cmd => {
        let c = cmd.trim().toUpperCase();
        if (!c) return;
        if (c.startsWith('CREATE TABLE')) output += `> Tabela criada com sucesso.<br>`;
        else if (c.startsWith('INSERT INTO')) output += `> 1 linha inserida.<br>`;
        else if (c.startsWith('SELECT')) {
          output += `<table style="border-collapse: collapse; width: 100%; color: white; border: 1px solid #444; margin-top:5px;">
            <tr style="background: #333;"><th>ID</th><th>NOME</th></tr>
            <tr><td style="border: 1px solid #444; padding: 5px;">1</td><td style="border: 1px solid #444; padding: 5px;">Felipe</td></tr>
          </table>`;
        }
      });
    } catch (e) { output = `Erro SQL: ${e.message}`; }

    doc.open();
    doc.write(`<body style="font-family:monospace; padding:15px; background:#1e1e1e; color:#dcdcdc;">
      <div style="color:#4ec9b0; border-bottom:1px solid #333; margin-bottom:10px;"># Console SQL (Simulado)</div>
      ${output || "> Comando executado."}</body>`);
    doc.close();

  } else if (id === 'java') {
    let output = "";
    const lines = code.split('\n');
    try {
      lines.forEach(line => {
        let l = line.trim();
        if (l.includes("System.out.println(")) {
          let content = l.match(/\((.*)\)/)[1];
          let clean = content.replace(/"/g, '').replace(/\+/g, '');
          output += `> ${clean}<br>`;
        }
      });
    } catch (e) { output = `Erro Java: ${e.message}`; }

    doc.open();
    doc.write(`<body style="font-family:monospace; padding:15px; background:#1e1e1e; color:#dcdcdc;">
      <div style="color:#f8981d; border-bottom:1px solid #333; margin-bottom:10px;"># Java Console (Simulado)</div>
      ${output || "> Compilado com sucesso."}</body>`);
    doc.close();
  }
} // <--- Fecha a função aqui

function openQuiz(courseId, topicId) {
    const quizQuestions = quizzes[courseId]; // Busca no seu objeto 'quizzes'
    const course = courses.find(c => c.id === courseId);
    const container = document.getElementById('main-content');

    if (!quizQuestions) {
        alert("Quiz não encontrado para este curso.");
        return;
    }

    let quizHtml = `
        <div class="quiz-container" style="padding: 20px; background: white; border-radius: 12px;">
            <button class="btn" onclick="openTopic('${courseId}', '${topicId}')" style="margin-bottom: 20px;">← Voltar para a Aula</button>
            <h2 style="margin-bottom: 25px;">🧠 Quiz: ${course.title}</h2>
    `;

    quizQuestions.forEach((item, index) => {
        quizHtml += `
            <div class="quiz-card" style="margin-bottom: 30px; padding: 20px; border: 1px solid #eee; border-radius: 10px; background: #fafafa;">
                <p style="font-weight: bold; font-size: 1.1rem; margin-bottom: 15px;">${index + 1}. ${item.q}</p>
                <div style="display: grid; gap: 10px;">
                    ${item.options.map((opt, i) => `
                        <button class="quiz-opt" onclick="checkAnswer(this, ${i}, ${item.correct}, '${item.explanation.replace(/'/g, "\\'")}')" 
                                style="padding: 12px; text-align: left; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer;">
                            ${opt}
                        </button>
                    `).join('')}
                </div>
                <div class="explanation" style="display:none; margin-top: 15px; padding: 10px; background: #e7f3ff; border-radius: 5px; color: #0056b3; font-size: 0.9rem;">
                </div>
            </div>
        `;
    });

    quizHtml += `</div>`;
    container.innerHTML = quizHtml;
    window.scrollTo(0, 0);
}

function checkAnswer(btn, selected, correct, explanation) {
    const parent = btn.parentElement;
    const cards = parent.parentElement;
    const buttons = parent.querySelectorAll('button');
    const expDiv = cards.querySelector('.explanation');

    // Bloqueia outros cliques nesta questão
    buttons.forEach(b => b.style.pointerEvents = 'none');

    if (selected === correct) {
        btn.style.background = "#d4edda"; // Verde
        btn.style.borderColor = "#28a745";
        btn.innerHTML += " ✅";
    } else {
        btn.style.background = "#f8d7da"; // Vermelho
        btn.style.borderColor = "#dc3545";
        btn.innerHTML += " ❌";
        buttons[correct].style.background = "#d4edda"; // Mostra a certa
    }

    if (expDiv) {
        expDiv.style.display = "block";
        expDiv.innerHTML = `<strong>Por que?</strong> ${explanation}`;
    }
}
    function renderQuizInsideBox(courseId, targetId) {
    const quizBox = document.getElementById(`${targetId}-quiz-box`);
    const questions = quizzes[courseId];

    if (!quizBox || !questions) return;

    let html = '';
    questions.forEach((item, index) => {
        html += `
            <div style="margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px;">
                <p><strong>${index + 1}. ${item.q}</strong></p>
                ${item.options.map((opt, i) => `
                    <button class="quiz-opt" onclick="checkAnswer(this, ${i}, ${item.correct}, '${item.explanation.replace(/'/g, "\\'")}')" 
                            style="display:block; width:100%; margin:5px 0; text-align:left; padding:10px; border:1px solid #ddd; background:white; cursor:pointer; border-radius:5px;">
                        ${opt}
                    </button>
                `).join('')}
                <div class="explanation" style="display:none; margin-top:10px; color:#0056b3; font-size:0.9rem;"></div>
            </div>
        `;
    });
    quizBox.innerHTML = html;
}
