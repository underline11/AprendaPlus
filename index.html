<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Plataforma Aprenda+ — Cursos</title>
  <style>
    :root{
      --primary:#0a84ff;
      --bg:#f7f9fc;
      --card:#fff;
      --muted:#64748b;
      --shadow:0 6px 18px rgba(10,20,40,0.08);
      --radius:12px;
    }
    *{box-sizing:border-box}
    body{
      font-family:'Open Sans', Arial, sans-serif;
      margin:0;
      background:linear-gradient(180deg,var(--bg),#ffffff);
      color:#0f1724;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:18px 28px;
    }
    .brand{display:flex;gap:12px;align-items:center;cursor:pointer}
    .logo{
      width:52px;height:52px;border-radius:10px;background:var(--primary);
      display:grid;place-items:center;color:#fff;font-weight:700;font-family:Poppins;
    }
    main{padding:20px;max-width:1100px;margin:0 auto;}
    .hero h1{font-family:'Poppins',sans-serif;font-size:26px;margin:6px 0}
    .hero p{color:var(--muted);margin:0}
    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:18px;
      margin-top:22px;
    }
    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:var(--shadow);
      transition:transform .18s,box-shadow .18s;
      cursor:pointer;
    }
    .card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(10,20,40,0.12)}
    .card h3{margin:6px 0 4px;font-size:18px}
    .card p{color:var(--muted);font-size:14px;margin:0}
    .btn{
      display:inline-block;background:linear-gradient(90deg,var(--primary),#0066ff);
      color:#fff;text-decoration:none;padding:9px 14px;border-radius:10px;font-weight:600;
      margin-top:12px;cursor:pointer;border:none;
    }
    .btn.secondary{background:transparent;color:var(--primary);border:1px solid rgba(10,132,255,0.12)}
    section.course{
      display:none;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
      padding:18px;margin-top:18px;
    }
    .levels{display:grid;gap:12px;margin-top:12px}
    .level{background:#fbfdff;border-radius:10px;padding:12px;border:1px solid rgba(10,20,40,0.03)}
    .visual { margin-top:12px; display:flex; gap:12px; flex-wrap:wrap; align-items:flex-start; }
    canvas { border-radius:10px; background:linear-gradient(180deg, #fff, #f8fbff); box-shadow:0 6px 18px rgba(10,20,40,0.02); }
    .quiz{margin-top:16px}
    .question-box{padding:12px;border-radius:10px;background:#ffffff;border:1px solid rgba(10,20,40,0.04)}
    .options{display:grid;gap:8px;margin-top:10px}
    .option-btn{
      padding:10px 12px;border-radius:8px;border:1px solid rgba(10,20,40,0.06);
      background:transparent;cursor:pointer;text-align:left;
    }
    .option-btn.selected{outline:3px solid rgba(10,132,255,0.12)}
    .progress{font-size:13px;color:var(--muted);margin-top:8px}
    footer{padding:22px;text-align:center;color:var(--muted);margin-top:18px}
    @media (max-width:700px){
      header{padding:14px}
      .cards{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
      .visual{flex-direction:column}
    }
  </style>
</head>

    function runCode(id) {
  const code = document.getElementById('code-input').value;
  const iframe = document.getElementById('output-frame');
  const doc = iframe.contentDocument || iframe.contentWindow.document;

  if (id === 'desenvolvimento') {
    const blob = new Blob([code], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    iframe.src = url;
    iframe.onload = () => URL.revokeObjectURL(url);

  } else if (id === 'python') {
    let output = "";
    const lines = code.split('\n');
    try {
      lines.forEach(line => {
        let l = line.trim();
        if (!l || l.startsWith('#')) return;
        if (l.startsWith('print(')) {
          let content = l.match(/\((.*)\)/)[1];
          output += `> ${content.replace(/['"]/g, '')}<br>`;
        }
      });
    } catch (e) { output = `<span style="color:red;">Erro: ${e.message}</span>`; }
    
    doc.open();
    doc.write(`<body style="font-family:monospace; padding:15px; background:#1e1e1e; color:#dcdcdc;">
      <div style="color:#569cd6; border-bottom:1px solid #333; margin-bottom:10px;"># Console Python</div>
      ${output || "> Código executado."}</body>`);
    doc.close();

  } else if (id === 'banco-de-dados') {
    let output = "";
    try {
      const commands = code.split(';');
      commands.forEach(cmd => {
        let c = cmd.trim().toUpperCase();
        if (!c) return;
        if (c.startsWith('CREATE TABLE')) output += `> Tabela criada com sucesso.<br>`;
        else if (c.startsWith('INSERT INTO')) output += `> 1 linha inserida.<br>`;
        else if (c.startsWith('SELECT')) {
          output += `<table style="border-collapse: collapse; width: 100%; color: white; border: 1px solid #444; margin-top:5px;">
            <tr style="background: #333;"><th>ID</th><th>NOME</th></tr>
            <tr><td style="border: 1px solid #444; padding: 5px;">1</td><td style="border: 1px solid #444; padding: 5px;">Felipe</td></tr>
          </table>`;
        }
      });
    } catch (e) { output = `Erro SQL: ${e.message}`; }

    doc.open();
    doc.write(`<body style="font-family:monospace; padding:15px; background:#1e1e1e; color:#dcdcdc;">
      <div style="color:#4ec9b0; border-bottom:1px solid #333; margin-bottom:10px;"># Console SQL (Simulado)</div>
      ${output || "> Comando executado."}</body>`);
    doc.close();

  } else if (id === 'java') {
    let output = "";
    const lines = code.split('\n');
    try {
      lines.forEach(line => {
        let l = line.trim();
        if (l.includes("System.out.println(")) {
          let content = l.match(/\((.*)\)/)[1];
          let clean = content.replace(/"/g, '').replace(/\+/g, '');
          output += `> ${clean}<br>`;
        }
      });
    } catch (e) { output = `Erro Java: ${e.message}`; }

    doc.open();
    doc.write(`<body style="font-family:monospace; padding:15px; background:#1e1e1e; color:#dcdcdc;">
      <div style="color:#f8981d; border-bottom:1px solid #333; margin-bottom:10px;"># Java Console (Simulado)</div>
      ${output || "> Compilado com sucesso."}</body>`);
    doc.close();
  }
} // <--- Fecha a função aqui

function openQuiz(courseId, topicId) {
    const quizQuestions = quizzes[courseId]; // Busca no seu objeto 'quizzes'
    const course = courses.find(c => c.id === courseId);
    const container = document.getElementById('main-content');

    if (!quizQuestions) {
        alert("Quiz não encontrado para este curso.");
        return;
    }

    let quizHtml = `
        <div class="quiz-container" style="padding: 20px; background: white; border-radius: 12px;">
            <button class="btn" onclick="openTopic('${courseId}', '${topicId}')" style="margin-bottom: 20px;">← Voltar para a Aula</button>
            <h2 style="margin-bottom: 25px;">🧠 Quiz: ${course.title}</h2>
    `;

    quizQuestions.forEach((item, index) => {
        quizHtml += `
            <div class="quiz-card" style="margin-bottom: 30px; padding: 20px; border: 1px solid #eee; border-radius: 10px; background: #fafafa;">
                <p style="font-weight: bold; font-size: 1.1rem; margin-bottom: 15px;">${index + 1}. ${item.q}</p>
                <div style="display: grid; gap: 10px;">
                    ${item.options.map((opt, i) => `
                        <button class="quiz-opt" onclick="checkAnswer(this, ${i}, ${item.correct}, '${item.explanation.replace(/'/g, "\\'")}')" 
                                style="padding: 12px; text-align: left; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer;">
                            ${opt}
                        </button>
                    `).join('')}
                </div>
                <div class="explanation" style="display:none; margin-top: 15px; padding: 10px; background: #e7f3ff; border-radius: 5px; color: #0056b3; font-size: 0.9rem;">
                </div>
            </div>
        `;
    });

    quizHtml += `</div>`;
    container.innerHTML = quizHtml;
    window.scrollTo(0, 0);
}

function checkAnswer(btn, selected, correct, explanation) {
    const parent = btn.parentElement;
    const cards = parent.parentElement;
    const buttons = parent.querySelectorAll('button');
    const expDiv = cards.querySelector('.explanation');

    // Bloqueia outros cliques nesta questão
    buttons.forEach(b => b.style.pointerEvents = 'none');

    if (selected === correct) {
        btn.style.background = "#d4edda"; // Verde
        btn.style.borderColor = "#28a745";
        btn.innerHTML += " ✅";
    } else {
        btn.style.background = "#f8d7da"; // Vermelho
        btn.style.borderColor = "#dc3545";
        btn.innerHTML += " ❌";
        buttons[correct].style.background = "#d4edda"; // Mostra a certa
    }

    if (expDiv) {
        expDiv.style.display = "block";
        expDiv.innerHTML = `<strong>Por que?</strong> ${explanation}`;
    }
}
    function renderQuizInsideBox(courseId, targetId) {
    const quizBox = document.getElementById(`${targetId}-quiz-box`);
    const questions = quizzes[courseId];

    if (!quizBox || !questions) return;

    let html = '';
    questions.forEach((item, index) => {
        html += `
            <div style="margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px;">
                <p><strong>${index + 1}. ${item.q}</strong></p>
                ${item.options.map((opt, i) => `
                    <button class="quiz-opt" onclick="checkAnswer(this, ${i}, ${item.correct}, '${item.explanation.replace(/'/g, "\\'")}')" 
                            style="display:block; width:100%; margin:5px 0; text-align:left; padding:10px; border:1px solid #ddd; background:white; cursor:pointer; border-radius:5px;">
                        ${opt}
                    </button>
                `).join('')}
                <div class="explanation" style="display:none; margin-top:10px; color:#0056b3; font-size:0.9rem;"></div>
            </div>
        `;
    });
    quizBox.innerHTML = html;
}
    function initPhysicsInteractivity() {
  const canvas = document.getElementById('physics-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const inputAcc = document.getElementById('input-acc');
  const physicsText = document.getElementById('physics-text');

  let time = 0;
  let animationId;

  function draw() {
    const a = parseFloat(inputAcc.value);
    physicsText.innerText = `Aceleração: ${a} m/s² | v = ${a} · t`;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Desenhar Eixos do Gráfico
    ctx.strokeStyle = '#e2e8f0';
    ctx.beginPath(); 
    ctx.moveTo(40, 20); ctx.lineTo(40, 160); // Eixo V
    ctx.lineTo(380, 160); // Eixo T
    ctx.stroke();

    // 1. Desenhar a linha da Velocidade no gráfico
    ctx.strokeStyle = '#2563eb';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(40, 160);
    for (let t = 0; t <= 340; t++) {
      // v = a * t. Ajustamos a escala para o canvas
      let v = (a * (t / 40)) * 15; 
      ctx.lineTo(40 + t, 160 - v);
    }
    ctx.stroke();

    // 2. Simulação visual (A "bolinha" acelerando)
    time += 0.05;
    if (time > 10) time = 0; // Reinicia a animação

    // Posição s = s0 + v0t + 0.5at² (simplificado para o visual)
    let posX = 40 + (0.5 * a * (time * time) * 2);
    if (posX > 380) time = 0; // Reset se fugir da tela

    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.arc(posX, 185, 10, 0, Math.PI * 2);
    ctx.fill();
    
    // Trilho da bolinha
    ctx.fillStyle = '#eee';
    ctx.fillRect(40, 195, 340, 2);

    animationId = requestAnimationFrame(draw);
  }

  inputAcc.addEventListener('input', () => {
    time = 0; // Reseta animação ao mexer no slider
  });

  draw();
}

function initQuadraticInteractivity() {
  const canvas = document.getElementById('math-canvas-intermediate');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const inputA = document.getElementById('input-quad-a');
  const inputB = document.getElementById('input-quad-b');
  const inputC = document.getElementById('input-quad-c');
  const formulaText = document.getElementById('formula-quad-text');

  function draw() {
    const a = parseFloat(inputA.value);
    const b = parseFloat(inputB.value);
    const c = parseFloat(inputC.value);
    formulaText.innerText = `f(x) = ${a}x² ${b >= 0 ? '+ '+b : '- '+Math.abs(b)}x ${c >= 0 ? '+ '+c : '- '+Math.abs(c)}`;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#e2e8f0';
    ctx.beginPath(); ctx.moveTo(200, 0); ctx.lineTo(200, 250); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 125); ctx.lineTo(400, 125); ctx.stroke();
    ctx.strokeStyle = '#ea580c';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let x = -100; x <= 100; x++) {
      let y = a * (x * x) + b * x + c;
      let canvasX = 200 + x * 2;
      let canvasY = 125 - y;
      if (x === -100) ctx.moveTo(canvasX, canvasY);
      else ctx.lineTo(canvasX, canvasY);
    }
    ctx.stroke();
  }
  [inputA, inputB, inputC].forEach(input => input.addEventListener('input', draw));
  draw();
}
 function initDerivativeInteractivity() {
  const canvas = document.getElementById('math-canvas-advanced');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const inputX = document.getElementById('input-der-x');
  const formulaText = document.getElementById('formula-der-text');

  function draw() {
    const px = parseFloat(inputX.value);
    const a = 0.05; // Fixamos uma parábola simples: f(x) = 0.05x²
    
    // f(x) = a*x² -> Derivada f'(x) = 2*a*x
    const slope = 2 * a * px;
    const py = a * (px * px);

    formulaText.innerText = `No ponto x = ${px}, a inclinação é ${slope.toFixed(2)}`;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Eixos
    ctx.strokeStyle = '#e2e8f0';
    ctx.beginPath(); ctx.moveTo(200, 0); ctx.lineTo(200, 250); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 125); ctx.lineTo(400, 125); ctx.stroke();

    // 1. Desenha a Parábola (fundo)
    ctx.strokeStyle = '#cbd5e1';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = -100; x <= 100; x++) {
      let y = a * (x * x);
      ctx.lineTo(200 + x * 2, 125 - y);
    }
    ctx.stroke();

    // 2. Desenha a Reta Tangente (A Derivada)
    ctx.strokeStyle = '#16a34a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let x = px - 50; x <= px + 50; x++) {
      // Equação da reta tangente: y - y1 = m(x - x1) -> y = m(x - px) + py
      let y = slope * (x - px) + py;
      ctx.lineTo(200 + x * 2, 125 - y);
    }
    ctx.stroke();

    // 3. Desenha o Ponto do contato
    ctx.fillStyle = '#16a34a';
    ctx.beginPath();
    ctx.arc(200 + px * 2, 125 - py, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  inputX.addEventListener('input', draw);
  draw();
}

function initQuiz(id, targetBoxId = null) {
    const containerId = targetBoxId || `${id}-quiz-box`;
    const container = document.getElementById(containerId);
    const questions = quizzes[id];

    if (!container || !questions) {
        console.warn(`Quiz não encontrado para: ${id}`);
        return false; 
    }

    container.innerHTML = questions.map((q, index) => {
        // Resolve o problema do 'undefined' buscando por vários nomes possíveis
        const textoDaPergunta = q.question || q.text || q.pergunta || "Pergunta sem texto";
        
        return `
        <div class="quiz-item" style="margin-bottom: 25px; padding: 15px; border: 1px solid #eee; border-radius: 8px;">
            <p><strong>${index + 1}. ${textoDaPergunta}</strong></p>
            <div class="options" style="display: flex; flex-direction: column; gap: 10px;">
                ${q.options.map((opt, i) => `
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="radio" name="q${index}" value="${i}">
                        <span>${opt}</span>
                    </label>
                `).join('')}
            </div>
            <button class="btn" onclick="checkAnswer(this, ${q.correct}, 'q${index}')" style="margin-top: 15px; background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">
                Verificar
            </button>
            <div class="feedback" style="margin-top: 10px; font-weight: bold; min-height: 20px;"></div>
        </div>
    `}).join('');

    return true;
}

// Função auxiliar para verificar a resposta (Correct/Wrong)
function checkAnswer(btn, correctIdx, radioName) {
    const selected = document.querySelector(`input[name="${radioName}"]:checked`);
    const feedback = btn.nextElementSibling;

    if (!selected) {
        feedback.innerHTML = "⚠️ Selecione uma opção!";
        feedback.style.color = "orange";
        return;
    }

    if (parseInt(selected.value) === correctIdx) {
        feedback.innerHTML = "✅ Correto!";
        feedback.style.color = "green";
        btn.parentElement.style.borderLeft = "5px solid green";
    } else {
        feedback.innerHTML = "❌ Tente novamente.";
        feedback.style.color = "red";
        btn.parentElement.style.borderLeft = "5px solid red";
    }
}
  function initChemistryInteractivity() {
    const slider = document.getElementById('ph-slider');
    const display = document.getElementById('ph-display');
    const box = document.getElementById('ph-box');

    if (!slider) return;

    slider.addEventListener('input', () => {
        const val = parseFloat(slider.value);
        display.innerText = val.toFixed(1);
        
        // Lógica de cores (Vermelho -> Azul)
        if (val < 7) {
            box.style.background = `rgba(255, 0, 0, ${1 - val/7})`;
            box.innerText = "Ambiente Ácido 🍋";
        } else if (val > 7) {
            box.style.background = `rgba(0, 0, 255, ${(val-7)/7})`;
            box.innerText = "Ambiente Básico (Alcalino) 🧼";
        } else {
            box.style.background = "#e2e8f0";
            box.innerText = "Neutro (Água Pura) 💧";
        }
    });
}
