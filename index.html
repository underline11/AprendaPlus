<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Plataforma Aprenda+ — Cursos</title>
  <style>
    :root{
      --primary:#0a84ff;
      --bg:#f7f9fc;
      --card:#fff;
      --muted:#64748b;
      --shadow:0 6px 18px rgba(10,20,40,0.08);
      --radius:12px;
    }
    *{box-sizing:border-box}
    body{
      font-family:'Open Sans', Arial, sans-serif;
      margin:0;
      background:linear-gradient(180deg,var(--bg),#ffffff);
      color:#0f1724;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:18px 28px;
    }
    .brand{display:flex;gap:12px;align-items:center;cursor:pointer}
    .logo{
      width:52px;height:52px;border-radius:10px;background:var(--primary);
      display:grid;place-items:center;color:#fff;font-weight:700;font-family:Poppins;
    }
    main{padding:20px;max-width:1100px;margin:0 auto;}
    .hero h1{font-family:'Poppins',sans-serif;font-size:26px;margin:6px 0}
    .hero p{color:var(--muted);margin:0}
    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:18px;
      margin-top:22px;
    }
    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:var(--shadow);
      transition:transform .18s,box-shadow .18s;
      cursor:pointer;
    }
    .card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(10,20,40,0.12)}
    .card h3{margin:6px 0 4px;font-size:18px}
    .card p{color:var(--muted);font-size:14px;margin:0}
    .btn{
      display:inline-block;background:linear-gradient(90deg,var(--primary),#0066ff);
      color:#fff;text-decoration:none;padding:9px 14px;border-radius:10px;font-weight:600;
      margin-top:12px;cursor:pointer;border:none;
    }
    .btn.secondary{background:transparent;color:var(--primary);border:1px solid rgba(10,132,255,0.12)}
    section.course{
      display:none;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
      padding:18px;margin-top:18px;
    }
    .levels{display:grid;gap:12px;margin-top:12px}
    .level{background:#fbfdff;border-radius:10px;padding:12px;border:1px solid rgba(10,20,40,0.03)}
    .visual { margin-top:12px; display:flex; gap:12px; flex-wrap:wrap; align-items:flex-start; }
    canvas { border-radius:10px; background:linear-gradient(180deg, #fff, #f8fbff); box-shadow:0 6px 18px rgba(10,20,40,0.02); }
    .quiz{margin-top:16px}
    .question-box{padding:12px;border-radius:10px;background:#ffffff;border:1px solid rgba(10,20,40,0.04)}
    .options{display:grid;gap:8px;margin-top:10px}
    .option-btn{
      padding:10px 12px;border-radius:8px;border:1px solid rgba(10,20,40,0.06);
      background:transparent;cursor:pointer;text-align:left;
    }
    .option-btn.selected{outline:3px solid rgba(10,132,255,0.12)}
    .progress{font-size:13px;color:var(--muted);margin-top:8px}
    footer{padding:22px;text-align:center;color:var(--muted);margin-top:18px}
    @media (max-width:700px){
      header{padding:14px}
      .cards{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
      .visual{flex-direction:column}
    }
    .grid-menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.card-sub {
    background: #ffffff;
    border: 2px solid #e2e8f0;
    border-radius: 15px;
    padding: 20px;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
}

.card-sub:hover {
    transform: translateY(-5px);
    border-color: #3b82f6;
}

.lesson-item {
    display: flex;
    align-items: center;
    gap: 15px;
    background: #f8fafc;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.lesson-item:hover {
    background: #eff6ff;
}
 /* Container Principal estilo 'Painel de Controle' */
.lab-physics {
    background: #2c3e50;
    border: 4px solid #1a252f;
    border-radius: 20px;
    padding: 30px;
    color: #ecf0f1;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* O Circuito */
.circuit-area {
    background: #ecf0f1;
    border-radius: 10px;
    height: 200px;
    display: flex;
    align-items: center;
    padding: 20px;
    margin-bottom: 25px;
    border: 5px solid #bdc3c7;
    position: relative;
}

/* Fio com efeito de brilho */
.wire {
    height: 6px;
    background: #34495e;
    flex-grow: 1;
    transition: all 0.3s;
    box-shadow: 0 0 0px rgba(241, 196, 15, 0);
}

/* Lâmpada Realista */
.bulb {
    width: 60px;
    height: 60px;
    background: #95a5a6;
    border-radius: 50% 50% 15% 15%;
    border: 3px solid #7f8c8d;
    position: relative;
    transition: 0.4s;
}

.bulb::after { /* Base da lâmpada */
    content: '';
    position: absolute;
    bottom: -10px;
    left: 15px;
    width: 30px;
    height: 15px;
    background: #7f8c8d;
    border-radius: 3px;
}

/* Multímetro Digital */
.display-digital {
    background: #000;
    color: #00ff00;
    font-family: 'Courier New', Courier, monospace;
    padding: 10px;
    border-radius: 5px;
    border: 2px solid #555;
    text-align: center;
    font-size: 1.2rem;
    box-shadow: inset 0 0 10px rgba(0,255,0,0.2);
}
 .geo-lab {
    background: #1a1a1a;
    border-radius: 15px;
    padding: 25px;
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

/* Área de Visualização do Solo */
.crust-view {
    height: 250px;
    background: #8b4513; /* Cor de terra */
    position: relative;
    overflow: hidden;
    border-bottom: 10px solid #ff4500; /* Magma/Astenosfera */
    margin-bottom: 20px;
}

.plate {
    width: 50%;
    height: 60px;
    background: #5d4037;
    position: absolute;
    top: 50px;
    border-top: 5px solid #4caf50; /* Grama/Vegetação */
    transition: all 1s ease-in-out;
}

#plate-left { left: 0; border-right: 2px solid #3d2b1f; }
#plate-right { right: 0; border-left: 2px solid #3d2b1f; }

/* Efeito de Tremor (Terremoto) */
@keyframes shake {
    0% { transform: translate(1px, 1px); }
    20% { transform: translate(-3px, 0px); }
    40% { transform: translate(3px, 2px); }
    100% { transform: translate(1px, -1px); }
}
 /* geo-lab-style.css */

/* Container para os ícones geológicos */
.geo-icon-container {
    position: absolute;
    top: 10px; /* Acima da grama */
    width: 100%;
    height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none; /* Não atrapalha cliques */
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
}

.geo-icon {
    font-size: 30px;
    margin: 0 10px;
}

/* Animação de surgimento suave */
.icon-appear {
    opacity: 1;
}
 /* Estilo do Visor do Microscópio */
.microscope-viewport {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 15px solid #333;
    margin: 20px auto;
    overflow: hidden;
    position: relative;
    background: #000;
    box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
}

#cell-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease, filter 0.2s ease;
    filter: blur(10px); /* Começa desfocado */
}

/* Painel de Controle Estilo Laboratório */
.bio-controls {
    background: #e8f5e9;
    padding: 20px;
    border-radius: 10px;
    border: 2px solid #2e7d32;
}

.shaking { animation: shake 0.2s infinite; }
 .math-lab {
    background: #ffffff;
    background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
    background-size: 20px 20px; /* Efeito de papel milimetrado */
    border: 2px solid #0056b3;
    border-radius: 15px;
    padding: 20px;
    position: relative;
}

.shape-container {
    height: 250px;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 1px solid #eee;
    margin-bottom: 20px;
    position: relative;
}

#geo-shape {
    background: rgba(0, 86, 179, 0.3);
    border: 2px solid #0056b3;
    transition: all 0.2s ease;
}
 /* Espaço onde o objeto 3D flutua */
.scene-3d {
    width: 100%;
    height: 300px;
    perspective: 800px; /* Cria a sensação de profundidade */
    background: #f0f4f8;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 10px;
    overflow: hidden;
}

/* O objeto que será rotacionado */
.cube {
    width: 100px;
    height: 100px;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(-20deg) rotateY(30deg); /* Ângulo inicial */
    transition: transform 0.1s;
}

/* Estilo das faces do cubo */
.face {
    position: absolute;
    width: 100px;
    height: 100px;
    background: rgba(0, 80, 136, 0.7);
    border: 2px solid #005088;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    color: white;
}

/* Posicionamento inicial das faces para formar um cubo */
.front  { transform: translateZ(50px); }
.back   { transform: rotateY(180deg) translateZ(50px); }
.right  { transform: rotateY(90deg) translateZ(50px); }
.left   { transform: rotateY(-90deg) translateZ(50px); }
.top    { transform: rotateX(90deg) translateZ(50px); }
.bottom { transform: rotateX(-90deg) translateZ(50px); }
 /* O "Universo" */
.space-scene {
    width: 100%;
    height: 500px;
    background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
    perspective: 1200px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    border-radius: 20px;
}

/* Container que rotacionamos com a câmera */
.solar-system {
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(65deg); /* Visão inclinada padrão */
}

/* Estilo do Sol */
.sun {
    width: 60px;
    height: 60px;
    background: #ffcc00;
    border-radius: 50%;
    box-shadow: 0 0 50px #ff6600, inset 0 0 20px #ffffff;
    transform: rotateX(-65deg); /* Desfaz a inclinação para o Sol ficar "de frente" */
    position: absolute;
    z-index: 10;
}

/* Container de Órbita (é o que gira) */
.orbit {
    position: absolute;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    transform-style: preserve-3d;
    animation: orbit-rotation linear infinite;
}

/* O Planeta em si */
.planet {
    position: absolute;
    top: 50%;
    left: -10px; /* Posiciona na borda da órbita */
    width: 20px;
    height: 20px;
    border-radius: 50%;
    transform: rotateX(-65deg); /* Mantém o planeta "em pé" */
}

/* Animação das Órbitas */
@keyframes orbit-rotation {
    from { transform: rotateZ(0deg); }
    to { transform: rotateZ(360deg); }
}
.ocean-container {
    perspective: 1000px;
    width: 100%;
    height: 400px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #1a1a1a;
    border-radius: 15px;
}

/* 1. O AMBIENTE (A Câmera) */
.world {
    width: 100%;
    height: 400px;
    perspective: 1000px;
    background: #87ceeb; /* Céu */
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.chunk {
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(-30deg) rotateY(45deg);
    transition: transform 0.5s;
}

/* 2. O BLOCO (Estrutura) */
.block {
    position: absolute;
    width: 30px;
    height: 30px;
    transform-style: preserve-3d;
    transform: translate3d(calc(var(--x) * 30px), calc(var(--y) * -30px), calc(var(--z) * 30px));
    cursor: pointer;
    transition: transform 0.2s;
}

/* 3. AS 6 FACES (Obrigatório para não ficar transparente) */
.face {
    position: absolute;
    width: 30px;
    height: 30px;
    border: 1px solid rgba(0,0,0,0.1);
    backface-visibility: hidden;
}

/* Posicionamento 3D das faces */
.face.front  { transform: translateZ(15px); }
.face.back   { transform: rotateY(180deg) translateZ(15px); }
.face.left   { transform: rotateY(-90deg) translateZ(15px); }
.face.right  { transform: rotateY(90deg) translateZ(15px); }
.face.top    { transform: rotateX(90deg) translateZ(15px); }
.face.bottom { transform: rotateX(-90deg) translateZ(15px); }

/* 4. MATERIAIS (Cores corrigidas) */
.grass .face { background: #795548; } /* Lados terra */
.grass .top  { background: #5d8233; } /* Topo grama */

.stone .face { background: #95a5a6; }
.stone .right { background: #707b7c; }

.water .face { background: rgba(0, 105, 148, 0.6); border: none; }

/* 5. EFEITOS DE ESTRESSE FÍSICO */
.block.breaking { transform: scale(0); opacity: 0; }
.heat-stress { filter: sepia(0.5) saturate(2); transform: scale(1.05); }
/* Efeito de Gravidade/Instabilidade (Inclinação) */
    
/* 1. ESTRUTURA DO BLOCO */
.block {
    position: absolute;
    width: 30px;
    height: 30px;
    transform-style: preserve-3d;
    /* Usa o Y negativo para o prédio subir e não afundar no chão */
    transform: translate3d(calc(var(--x) * 30px), calc(var(--y) * -30px), calc(var(--z) * 30px));
    transform-origin: bottom; 
    transition: transform 0.3s ease-out, filter 0.5s;
    cursor: pointer;
}

/* 2. AS FACES */
.face {
    position: absolute;
    width: 30px;
    height: 30px;
    border: 1px solid rgba(0,0,0,0.1);
    backface-visibility: hidden; /* Melhora a performance */
    pointer-events: none; 
}

/* Posicionamento (Obrigatório para o cubo fechar) */
.face.front  { transform: translateZ(15px); }
.face.back   { transform: rotateY(180deg) translateZ(15px); }
.face.left   { transform: rotateY(-90deg) translateZ(15px); }
.face.right  { transform: rotateY(90deg) translateZ(15px); }
.face.top    { transform: rotateX(90deg) translateZ(15px); }
.face.bottom { transform: rotateX(-90deg) translateZ(15px); }

/* 3. MATERIAIS E ANIMAÇÕES */
.water .face { background: rgba(41, 128, 185, 0.6); }
.water-moving .face { 
    background: rgba(52, 152, 219, 0.9);
    animation: flow 1s infinite alternate; 
}

@keyframes flow {
    from { filter: hue-rotate(0deg); }
    to { filter: hue-rotate(20deg); }
}

.generator .face { background: #7f8c8d; border: 2px dashed #f1c40f; }
/* Adicione aqui os transforms das faces (frente, tras, etc.) que você já usava */
/* Quando a classe fluxo-ativo for adicionada via JS */
.water.fluxo-ativo .face {
    background: rgba(52, 152, 219, 0.8);
    box-shadow: inset 0 0 15px white;
    transition: all 0.5s ease;
}
/* Local: Arquivo CSS */
.water-moving .face {
    animation: waterFlowAnim 2s infinite ease-in-out;
}

@keyframes waterFlowAnim {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.3) saturate(1.2); }
    100% { filter: brightness(1); }
}
/* Bloco de Metal (Ferro) */
.block.iron .face {
    background: #4a4a4a; /* Um cinza bem escuro, metálico */
    border: 1px solid #222;
}
.block.iron .top {
    background: #666; /* Topo levemente mais claro */
}

/* Ajuste de profundidade para o Viewport */
/* O Container que segura os blocos precisa de perspectiva */
.world {
    perspective: 1000px;
    perspective-origin: center;
}

/* O local onde os blocos são gerados precisa manter o 3D */
/* O container azul que você criou */
#water-container {
    position: absolute; /* Mudado de relative para absolute */
    transform-style: preserve-3d;
    top: 60%;  /* Desci um pouco para você ver mais o céu */
    left: 50%;
    width: 0; 
    height: 0;
    /* Remova o transform daqui */
}

/* O container específico do foguete */
#foguete-container {
    position: absolute;
    top: 50%; /* Centraliza no meio da área azul */
    left: 50%;
    transform-style: preserve-3d;
    transition: transform 4s ease-in;
}

/* A classe dos blocos */
.chunk {
    position: absolute; /* Obrigatório para o posicionamento 3D */
    width: 32px;
    height: 32px;
    transform-style: preserve-3d;
    backface-visibility: visible;
    /* Adicione uma borda leve para ajudar a ver o 3D */

}

.stone { background-color: #95a5a6; }  /* Chão Cinza Claro */
.gold { background-color: #f1c40f; }   /* Motor */

.tremendo {
    animation: shake 0.1s infinite;
}
#viewport {
    perspective: 1200px; /* Aumentei um pouco a profundidade */
    perspective-origin: 50% 50%;
    background: #87CEEB;
    overflow: hidden; 
    position: relative;
    width: 100%;
    height: 300px;
    display: flex;
    justify-content: center;
    align-items: center;
}
/* Container do bloco (agora vazio, apenas posiciona) */

    position: absolute;

    transform-style: preserve-3d;
}

/* Estilo comum para todas as faces */

    position: absolute;

    border: 0.5px solid rgba(0,0,0,0.2); /* Ajuda a ver as bordas */
}

/* Posicionamento de cada face no espaço 3D */
.front  { transform: rotateY(0deg) translateZ(16px); }
.back   { transform: rotateY(180deg) translateZ(16px); }

.bottom { transform: rotateX(-90deg) translateZ(16px); }
.left   { transform: rotateY(-90deg) translateZ(16px); }

/* Aplica a cor/textura à face baseada no tipo do bloco pai */
.iron .face { background-color: #7f8c8d; }

#python-input:focus {
    color: #9cdcfe !important;
}

/* 1. Reset e Container Principal */
#city-project-wrapper {
    --bg-color: #1a1a1a;
    perspective: 1200px;
}

/* 2. O Mundo e a Grade */
.city-world {
    position: absolute;
    left: 50%; top: 50%;
    transform-style: preserve-3d;
    transition: transform 0.4s ease;
}

#city-grid-base {
    position: absolute;
    width: 2000px; height: 2000px;
    background-image: linear-gradient(#333 1px, transparent 1px), 
                      linear-gradient(90deg, #333 1px, transparent 1px);
    background-size: 50px 50px;
    transform: rotateX(90deg) translateZ(0);
    opacity: 0.2;
    left: -1000px; top: -1000px;
}

/* 3. Lógica do Cubo (O segredo do fechamento) */
.city-cube {
    position: absolute;
    transform-style: preserve-3d;
    /* Usa as variáveis definidas em cada tipo */
    width: var(--w);
    height: var(--h);
}

.city-face {
    position: absolute;
    width: var(--w);
    height: var(--h);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.5s ease;
    backface-visibility: visible;
}

/* Posicionamento das faces usando as variáveis */
.city-face.front  { transform: translateZ(calc(var(--d) / 2)); }
.city-face.back   { transform: rotateY(180deg) translateZ(calc(var(--d) / 2)); }
.city-face.left   { width: var(--d); transform: rotateY(-90deg) translateZ(calc(var(--w) / 2)); left: calc(50% - var(--d)/2); }
.city-face.right  { width: var(--d); transform: rotateY(90deg) translateZ(calc(var(--w) / 2)); left: calc(50% - var(--d)/2); }
.city-face.top    { height: var(--d); transform: rotateX(90deg) translateZ(calc(var(--h) / 2)); top: calc(50% - var(--d)/2); }

/* 4. Definição por Tipo (Tamanhos e Cores) */
.city-cube.house { 
    --w: 30px; --h: 30px; --d: 30px; 
}
.house .city-face { background: #e67e22; border-color: #a04000; }
.house .city-face.top { background: #d35400; }

.city-cube.office { 
    --w: 35px; --h: 100px; --d: 35px; 
}
.office .city-face { 
    background: #2c3e50; 
    background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 8px 12px;
}

.city-cube.power-plant { 
    --w: 80px; --h: 50px; --d: 80px; 
}
.power-plant .city-face { background: #7f8c8d; border: 2px solid #34495e; }

/* 5. Interatividade e Energia */
.city-cube:hover .city-face {
    filter: brightness(1.3);
    cursor: pointer;
    outline: 1px solid white;
}

#city-project-wrapper.power-on .office .city-face {

function openTopic(courseId, topicId) {
  const course = courses.find(c => c.id === courseId);
  // Proteção: se o curso ou a lista de tópicos não existir, para aqui
  if (!course || !course.topics) return;

  const topic = course.topics.find(t => t.id === topicId);
  if (!topic) return;

  if (topic.subtopics && Array.isArray(topic.subtopics) && topic.subtopics.length > 0) {
    courseContainer.innerHTML = `
      <div class="subtopic-menu">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2>${topic.title} - Assuntos</h2>
          <button class="btn secondary" onclick="openCourse('${courseId}')">← Voltar</button>
        </div>
        <div class="cards">
          ${topic.subtopics.map(sub => `
            <div class="card" onclick="openLesson('${courseId}', '${topicId}', '${sub.id}')">
              <h3>${sub.title}</h3>
              <button class="btn success" style="margin-top:10px;">Estudar</button>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } else {
    openLesson(courseId, topicId, null);
  }
}

let pyodideInstance = null; 
let sqlDB = null;

// 1. Inicialização Robusta
async function getPython() {
    if (!pyodideInstance) {
        pyodideInstance = await loadPyodide();
        // Resolve o erro "Illegal invocation" redirecionando o STDIN globalmente
        await pyodideInstance.runPython(`
import sys, io
sys.stdin = io.StringIO("")
        `);
        console.log("🐍 Motor Python configurado e isolado.");
    }
    return pyodideInstance;
}

async function runCode(courseId) {
    // 1. Localiza o editor de forma flexível (tenta um ID ou outro)
    const editor = document.getElementById('python-editor') || document.getElementById('code-input');
    const outputFrame = document.getElementById('output-frame');

    // Se não encontrar o editor, avisa e para
    if (!editor) {
        console.error("❌ Erro: Campo de código não encontrado para " + courseId);
        return;
    }

    const code = editor.value; // DECLARAÇÃO ÚNICA DO CÓDIGO
    const doc = outputFrame ? (outputFrame.contentDocument || outputFrame.contentWindow.document) : null;

    // Prepara o console visual se o iframe existir
    if (doc) {
        doc.open();
        doc.write(`<body style="background:#1e1e1e; color:#d4d4d4; font-family:monospace; padding:15px; margin:0; line-height:1.5;">
                   <p style="color:#6a9955; margin:0 0 10px 0;">> Console ${courseId.toUpperCase()}...</p>`);
    }

    try {
        // --- DESENVOLVIMENTO WEB ---
        if (courseId === 'desenvolvimento') {
            doc.write(code);
        } 

        // --- PYTHON (PADRÃO, FOGUETE OU USINA) ---
        else if (courseId === 'python' || courseId === 'lancamento-foguete' || courseId === 'usina-hidreletrica') {
            const py = await getPython();
            
            // Redireciona o print() do Python para o Iframe
            py.setStdout({ batched: (text) => {
                if(doc) doc.write(`<p style="margin:0; color:#9cdcfe;">${text}</p>`);
                console.log("PyOutput:", text);
            }});

            // Injeta as pontes necessárias dependendo do curso
            if (courseId === 'lancamento-foguete') {
                await py.runPythonAsync(`import js\nfrom js import window\njs.animarLancamento = window.animarLancamento`);
            } else if (courseId === 'usina-hidreletrica') {
                await py.runPythonAsync(`import js\nfrom js import window\njs.aplicarPotenciaHidro = window.aplicarPotenciaHidro`);
            }

            await py.runPythonAsync(code);
            if(doc) doc.write('<p style="color:#6a9955; border-top:1px solid #333; margin-top:10px;">[Processo finalizado]</p>');
        }

        // --- SQL ---
        else if (courseId === 'banco-de-dados') {
            if (!window.sqlDB) {
                const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });
                window.sqlDB = new SQL.Database();
                window.sqlDB.run("CREATE TABLE alunos (id INT, nome TEXT, curso TEXT);");
                window.sqlDB.run("INSERT INTO alunos VALUES (1, 'Filipe', 'Python'), (2, 'Ana', 'Dev Web');");
            }
            const res = window.sqlDB.exec(code);
            if (res.length > 0 && doc) {
                let table = "<table style='border:1px solid #444; width:100%; color:#9cdcfe;'>";
                res[0].values.forEach(row => { table += `<tr>${row.map(v => `<td>${v}</td>`).join('')}</tr>`; });
                doc.write(table + "</table>");
            }
        }

        // --- JAVA, C E OUTROS ---
        else {
            if(doc) {
                doc.write(`<p style="color:#ce9178;">Simulação concluída:</p>`);
                doc.write(`<p style="color:#fff;">Código recebido com sucesso (${code.length} caracteres).</p>`);
            }
        }

    } catch (err) {
        if(doc) doc.write(`<p style="color:#f44336; margin-top:10px;">❌ Erro: ${err}</p>`);
        console.error(err);
    }

    if(doc) {
        doc.write('</body>');
        doc.close();
    }
}

function openQuiz(courseId, topicId) {
    const quizQuestions = quizzes[courseId]; // Busca no seu objeto 'quizzes'
    const course = courses.find(c => c.id === courseId);
    const container = document.getElementById('main-content');

    if (!quizQuestions) {
        alert("Quiz não encontrado para este curso.");
        return;
    }

    let quizHtml = `
        <div class="quiz-container" style="padding: 20px; background: white; border-radius: 12px;">
            <button class="btn" onclick="openTopic('${courseId}', '${topicId}')" style="margin-bottom: 20px;">← Voltar para a Aula</button>
            <h2 style="margin-bottom: 25px;">🧠 Quiz: ${course.title}</h2>
    `;

    quizQuestions.forEach((item, index) => {
        quizHtml += `
            <div class="quiz-card" style="margin-bottom: 30px; padding: 20px; border: 1px solid #eee; border-radius: 10px; background: #fafafa;">
                <p style="font-weight: bold; font-size: 1.1rem; margin-bottom: 15px;">${index + 1}. ${item.q}</p>
                <div style="display: grid; gap: 10px;">
                    ${item.options.map((opt, i) => `
                        <button class="quiz-opt" onclick="checkAnswer(this, ${i}, ${item.correct}, '${item.explanation.replace(/'/g, "\\'")}')" 
                                style="padding: 12px; text-align: left; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer;">
                            ${opt}
                        </button>
                    `).join('')}
                </div>
                <div class="explanation" style="display:none; margin-top: 15px; padding: 10px; background: #e7f3ff; border-radius: 5px; color: #0056b3; font-size: 0.9rem;">
                </div>
            </div>
        `;
    });

    quizHtml += `</div>`;
    container.innerHTML = quizHtml;
    window.scrollTo(0, 0);
}

function checkAnswer(btn, selected, correct, explanation) {
    const parent = btn.parentElement;
    const cards = parent.parentElement;
    const buttons = parent.querySelectorAll('button');
    const expDiv = cards.querySelector('.explanation');

    // Bloqueia outros cliques nesta questão
    buttons.forEach(b => b.style.pointerEvents = 'none');

    if (selected === correct) {
        btn.style.background = "#d4edda"; // Verde
        btn.style.borderColor = "#28a745";
        btn.innerHTML += " ✅";
    } else {
        btn.style.background = "#f8d7da"; // Vermelho
        btn.style.borderColor = "#dc3545";
        btn.innerHTML += " ❌";
        buttons[correct].style.background = "#d4edda"; // Mostra a certa
    }

    if (expDiv) {
        expDiv.style.display = "block";
        expDiv.innerHTML = `<strong>Por que?</strong> ${explanation}`;
    }

    function initDerivativeChart() {
    const canvas = document.getElementById('math-canvas-advanced');
    const inputX = document.getElementById('input-der-x');
    const text = document.getElementById('formula-der-text');
    
    if (!canvas || !inputX) return;
    const ctx = canvas.getContext('2d');

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Configurações do gráfico
        const centerX = canvas.width / 2;
        const centerY = canvas.height - 50;
        const scale = 20;

        // 1. Desenha os Eixos
        ctx.strokeStyle = '#ddd';
        ctx.beginPath();
        ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY);
        ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height);
        ctx.stroke();

        // 2. Desenha a Parábola: f(x) = 0.1 * x²
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let x = -10; x <= 10; x += 0.1) {
            let canvasX = centerX + x * scale;
            let canvasY = centerY - (0.1 * x * x) * scale;
            if (x === -10) ctx.moveTo(canvasX, canvasY);
            else ctx.lineTo(canvasX, canvasY);
        }
        ctx.stroke();

        // 3. Lógica da Derivada
        const x0 = inputX.value / 10; // Valor do slider
        const y0 = 0.1 * x0 * x0;     // Ponto na curva
        const m = 0.2 * x0;           // Derivada de 0.1x² é 0.2x (Inclinação)

        // 4. Desenha a Reta Tangente
        ctx.strokeStyle = '#16a34a'; // Verde do seu HTML
        ctx.beginPath();
        for (let x = x0 - 3; x <= x0 + 3; x += 0.1) {
            let yTan = y0 + m * (x - x0);
            ctx.lineTo(centerX + x * scale, centerY - yTan * scale);
        }
        ctx.stroke();

        // 5. Ponto de Contato
        ctx.fillStyle = '#ff4d4d';
        ctx.beginPath();
        ctx.arc(centerX + x0 * scale, centerY - y0 * scale, 4, 0, Math.PI * 2);
        ctx.fill();

        text.innerText = `Ponto x = ${x0.toFixed(1)} | Inclinação (m) = ${m.toFixed(2)}`;
    }

    inputX.oninput = draw;
    draw();
}

    function initPhysicsInteractivity() {
  const canvas = document.getElementById('physics-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const inputAcc = document.getElementById('input-acc');
  const physicsText = document.getElementById('physics-text');

  let time = 0;
  let animationId;

  function draw() {
    const a = parseFloat(inputAcc.value);
    physicsText.innerText = `Aceleração: ${a} m/s² | v = ${a} · t`;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Desenhar Eixos do Gráfico
    ctx.strokeStyle = '#e2e8f0';
    ctx.beginPath(); 
    ctx.moveTo(40, 20); ctx.lineTo(40, 160); // Eixo V
    ctx.lineTo(380, 160); // Eixo T
    ctx.stroke();

    // 1. Desenhar a linha da Velocidade no gráfico
    ctx.strokeStyle = '#2563eb';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(40, 160);
    for (let t = 0; t <= 340; t++) {
      // v = a * t. Ajustamos a escala para o canvas
      let v = (a * (t / 40)) * 15; 
      ctx.lineTo(40 + t, 160 - v);
    }
    ctx.stroke();

    // 2. Simulação visual (A "bolinha" acelerando)
    time += 0.05;
    if (time > 10) time = 0; // Reinicia a animação

    // Posição s = s0 + v0t + 0.5at² (simplificado para o visual)
    let posX = 40 + (0.5 * a * (time * time) * 2);
    if (posX > 380) time = 0; // Reset se fugir da tela

    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.arc(posX, 185, 10, 0, Math.PI * 2);
    ctx.fill();
    
    // Trilho da bolinha
    ctx.fillStyle = '#eee';
    ctx.fillRect(40, 195, 340, 2);

    animationId = requestAnimationFrame(draw);
  }

  inputAcc.addEventListener('input', () => {
    time = 0; // Reseta animação ao mexer no slider
  });

  draw();
}

    function updatePhysics() {

    // Se o slider não existir (aba fechada), para a função aqui
    if (!sliderTemp) return;

    
    const temp = parseFloat(document.getElementById('slider-temp').value);
    const press = parseFloat(document.getElementById('slider-press').value);
    const grav = parseFloat(document.getElementById('slider-grav').value);
     
    // Selecionamos todos os blocos gerados pela função da Geografia
    const blocks = document.querySelectorAll('.block');
    const status = document.getElementById('status-display');

    blocks.forEach(block => {
        // Pegamos as coordenadas x, y, z que você salvou no elemento
        const x = parseFloat(block.style.getPropertyValue('--x'));
        const y = parseFloat(block.style.getPropertyValue('--y'));
        const z = parseFloat(block.style.getPropertyValue('--z'));

        // --- CÁLCULO DE FÍSICA ---

        // 1. Dilatação Térmica: O bloco cresce levemente
        const scale = 1 + (temp / 2000);

        // 2. Pressão: Blocos de baixo (y menor) achatam mais
        // Simulamos que a deformação é maior na base
        const pressureEffect = (press / 1000) * (8 - y); 
        const yDeformation = 1 - (pressureEffect / 10);

        // 3. Inclinação (Gravidade): O deslocamento em X aumenta com a altura (y)
        // Delta X = Altura * tangente do ângulo (simplificado)
        const tiltX = y * (grav / 10);

        // --- APLICAÇÃO VISUAL ---
        
        // Aplicamos a transformação individual do bloco
        // Mantemos o posicionamento original (translate3d) e adicionamos os efeitos
        block.style.transform = `
            translate3d(
                calc(${x} * 30px + ${tiltX}px), 
                calc(${y} * -30px), 
                calc(${z} * 30px)
            )
            scale(${scale})
            scaleY(${yDeformation})
        `;

        // Feedback de Cor: Bloco fica "quente" ou "sob pressão"
        if (temp > 70 || press > 170) {
            block.style.filter = `hue-rotate(${temp}deg) brightness(${1 - pressureEffect})`;
        } else {
            block.style.filter = "none";
        }
    });

    // Alerta de Colapso
    status.style.display = (temp > 85 || press > 185 || Math.abs(grav) > 15) ? "block" : "none";
}

    function renderMathGraph(type, value) {
    const canvas = document.getElementById('canvas-math');
    const info = document.getElementById('math-info');
    
    if (!canvas) return; // Trava de segurança contra erro "null"
    
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    const originX = 50;
    const originY = 250;

    // Limpa o desenho anterior
    ctx.clearRect(0, 0, w, h);

    // 1. Desenha Eixos X e Y
    ctx.beginPath();
    ctx.strokeStyle = "#333";
    ctx.lineWidth = 2;
    ctx.moveTo(originX, 20); ctx.lineTo(originX, originY); // Y
    ctx.moveTo(originX, originY); ctx.lineTo(w - 20, originY); // X
    ctx.stroke();

    // 2. Lógica Específica
    if (type === 'cinematica') {
        const a = parseFloat(value); // Aceleração do slider
        ctx.beginPath();
        ctx.strokeStyle = "#e74c3c";
        ctx.moveTo(originX, originY);
        
        // Desenha a parábola do MUV: s = s0 + v0t + (at²)/2
        for (let t = 0; t < 20; t++) {
            let x = originX + (t * 15);
            let y = originY - (0.5 * a * Math.pow(t, 2));
            ctx.lineTo(x, y);
        }
        ctx.stroke();
        info.innerHTML = `Equação: s = ${0.5 * a}t² | Aceleração: ${a} m/s²`;
    } 
    
    else if (type === 'derivada') {
        const xPoint = parseFloat(value); // Ponto X do slider
        // Função original: f(x) = x² / 40 (uma parábola suave)
        ctx.beginPath();
        ctx.strokeStyle = "#3498db";
        for (let px = 0; px < 300; px++) {
            let x = originX + px;
            let y = originY - (Math.pow(px, 2) / 40);
            if (px === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // Desenha a Reta Tangente (Derivada: f'(x) = 2x / 40)
        const slope = (2 * xPoint) / 40;
        const yPoint = Math.pow(xPoint, 2) / 40;
        
        ctx.beginPath();
        ctx.strokeStyle = "#2ecc71";
        ctx.lineWidth = 3;
        // Ponto da tangente
        ctx.arc(originX + xPoint, originY - yPoint, 4, 0, Math.PI * 2);
        ctx.fill();
        
        // Linha da tangente (y - y0 = m(x - x0))
        ctx.moveTo(originX + xPoint - 50, originY - (yPoint - (slope * 50)));
        ctx.lineTo(originX + xPoint + 50, originY - (yPoint + (slope * 50)));
        ctx.stroke();
        
        info.innerHTML = `Ponto x: ${xPoint} | Inclinação (Derivada): ${slope.toFixed(2)}`;
    }
}

        const tangentData = [];
        const areaData = [];

        for (let x = -2; x <= 2; x += 0.1) {
            labels.push(x.toFixed(1));
            funcData.push(f(x));
            
            // Lógica da Derivada: y = f(p) + f'(p)*(x - p)
            if (currentCalcMode === 'derivada') {
                const yTan = f(point) + df(point) * (x - point);
                tangentData.push(yTan);
            }
            
            // Lógica da Integral: Preenche apenas até o ponto selecionado
            if (currentCalcMode === 'integral' && x <= point) {
                areaData.push(f(x));
            } else {
                areaData.push(null);
            }
        }
        return { labels, funcData, tangentData, areaData };
    }

    const initial = generateChartData(0);
    const calcChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: initial.labels,
            datasets: [
                { label: 'f(x) = x²', data: initial.funcData, borderColor: '#333', borderWidth: 2, pointRadius: 0, fill: false },
                { label: 'Tangente / Área', data: currentCalcMode === 'derivada' ? initial.tangentData : initial.areaData, 
                  borderColor: '#ff4757', backgroundColor: 'rgba(255, 71, 87, 0.3)', fill: currentCalcMode === 'integral', pointRadius: 0 }
            ]
        },
        options: {
            scales: { y: { min: -1, max: 4 } },
            animation: { duration: 0 }
        }
    });

    slider.addEventListener('input', (e) => {
        const p = parseFloat(e.target.value);
        const updated = generateChartData(p);
        calcChart.data.datasets[1].data = currentCalcMode === 'derivada' ? updated.tangentData : updated.areaData;
        calcChart.data.datasets[1].fill = currentCalcMode === 'integral';
        calcChart.update();
    });

    // Função global para trocar o modo
    window.switchCalculus = (mode) => {
        currentCalcMode = mode;
        document.getElementById('calc-title').innerText = mode === 'derivada' ? '📈 Reta Tangente (Derivada)' : '📐 Área sob a Curva (Integral)';
        document.getElementById('calc-desc').innerText = mode === 'derivada' ? 
            'A inclinação desta reta é o valor da derivada no ponto.' : 
            'A integral definida calcula o acúmulo de área entre a curva e o eixo X.';
        const data = generateChartData(parseFloat(slider.value));
        calcChart.data.datasets[1].data = mode === 'derivada' ? data.tangentData : data.areaData;
        calcChart.data.datasets[1].fill = mode === 'integral';
        calcChart.update();
    };
}

    function initDerivativeInteractivity() {
  const canvas = document.getElementById('math-canvas-advanced');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const inputX = document.getElementById('input-der-x');
  const formulaText = document.getElementById('formula-der-text');

  function draw() {
    const px = parseFloat(inputX.value);
    const a = 0.05; // Fixamos uma parábola simples: f(x) = 0.05x²
    
    // f(x) = a*x² -> Derivada f'(x) = 2*a*x
    const slope = 2 * a * px;
    const py = a * (px * px);

    formulaText.innerText = `No ponto x = ${px}, a inclinação é ${slope.toFixed(2)}`;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Eixos
    ctx.strokeStyle = '#e2e8f0';
    ctx.beginPath(); ctx.moveTo(200, 0); ctx.lineTo(200, 250); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 125); ctx.lineTo(400, 125); ctx.stroke();

    // 1. Desenha a Parábola (fundo)
    ctx.strokeStyle = '#cbd5e1';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = -100; x <= 100; x++) {
      let y = a * (x * x);
      ctx.lineTo(200 + x * 2, 125 - y);
    }
    ctx.stroke();

    // 2. Desenha a Reta Tangente (A Derivada)
    ctx.strokeStyle = '#16a34a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let x = px - 50; x <= px + 50; x++) {
      // Equação da reta tangente: y - y1 = m(x - x1) -> y = m(x - px) + py
      let y = slope * (x - px) + py;
      ctx.lineTo(200 + x * 2, 125 - y);
    }
    ctx.stroke();

    // 3. Desenha o Ponto do contato
    ctx.fillStyle = '#16a34a';
    ctx.beginPath();
    ctx.arc(200 + px * 2, 125 - py, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  inputX.addEventListener('input', draw);
  draw();
}

function construirCenario(tipoCenario, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return; 

    container.innerHTML = ''; 
    const size = 6; 

    for (let x = 0; x < size; x++) {
        for (let z = 0; z < size; z++) {
            
            // Define a altura máxima baseada no tipo
            let yMax = 0;
            if (tipoCenario === 'montanha') yMax = Math.floor(Math.random() * 4);
            if (tipoCenario === 'usina') {
                if (x === 3) yMax = 4;      // Altura da Barragem
                else if (x < 3) yMax = 3;   // Profundidade da Água
                else yMax = 0;              // Chão seco na frente
            }

            for (let y = 0; y <= yMax; y++) {
                let material = 'dirt';

                if (tipoCenario === 'usina') {
                    if (x === 3) material = 'stone';
                    else if (x < 3) material = 'water';
                    else material = 'grass';
                } else {
                    material = (y === yMax) ? 'grass' : (y < yMax - 1 ? 'stone' : 'dirt');
                }

                createBlock(x, y, z, material, containerId);
            }
        }
    }
}

   function gerarMapaChunks() {
    const container = document.getElementById('water-container') || document.getElementById('building-structure');
    if (!container) return;
    container.innerHTML = ''; 
    
    const tamanho = 10; 

    for (let x = 0; x < tamanho; x++) {
        for (let z = 0; z < tamanho; z++) {
            
            // 1. BASE: Chão de Grama (Nível 0)
            createBlock(x, 0, z, 'grass', container.id);

            // 2. BARRAGEM (X=4) e ESCADA DE PEIXES (Z=0)
            if (x === 4) {
                for (let y = 1; y <= 5; y++) {
                    // Vertedouro no topo
                    if ((z === 4 || z === 5) && y === 5) continue;
                    // Escada de peixes (mais baixa que o muro)
                    if (z === 0 && y > 3) continue; 
                    
                    createBlock(x, y, z, 'stone', container.id);
                }
            }

            // 3. RESERVATÓRIO (X < 4)
            else if (x < 4) {
                for (let y = 1; y <= 4; y++) {
                    createBlock(x, y, z, 'water', container.id);
                }
            }

            // 4. CASA DE FORÇA (Turbinas - X=5)
            else if (x === 5 && z >= 3 && z <= 6) {
                for (let y = 1; y <= 2; y++) {
                    createBlock(x, y, z, 'iron', container.id);
                }
            }

            // 5. SUBESTAÇÃO (X=8 a 9)
            else if (x >= 8 && x <= 9 && z >= 2 && z <= 4) {
                createBlock(x, 1, z, 'stone', container.id);
                if (x === 8 && z === 3) {
                    createBlock(x, 2, z, 'iron', container.id); // Transformador
                }
            }

            // 6. RIO DE SAÍDA (Onde a água flui após as turbinas)
            else if (x > 5 && z >= 3 && z <= 6) {
                createBlock(x, 1, z, 'water', container.id);
            }

            // 7. TORRE DE TRANSMISSÃO
            if (x === 1 && z === 8) {
                for (let y = 1; y <= 7; y++) {
                    createBlock(x, y, z, 'iron', container.id);
                }
                createBlock(0, 6, 8, 'iron', container.id);
                createBlock(2, 6, 8, 'iron', container.id);
            }
        }
    }
    console.log("Usina Hidrelétrica Completa Renderizada!");
}

    updatePos(el) {
        const x = parseInt(el.dataset.x);
        const z = parseInt(el.dataset.z);
        const offset = 60; // Tamanho da grade
        
        // Ajuste de altura automático por tipo
        let y = 0;
        if (el.classList.contains('office')) y = -50;
        else if (el.classList.contains('power-plant')) y = -25;
        else if (el.classList.contains('apartment')) y = -40;
        else y = -15;

        el.style.transform = `translate3d(${x * offset}px, ${y}px, ${z * offset}px)`;
    }

    rotate(dir) {
        this.rotationY += (dir === 'left' ? -15 : 15);
        this.world.style.transform = `rotateX(${this.rotationX}deg) rotateY(${this.rotationY}deg)`;
    }
}

// Forçamos a criação do gráfico de forma isolada
function montarGrafico() {
    const canvas = document.getElementById('city-energy-chart');
    if (!canvas) return;

    // Destruir se já existir para evitar erro de "Canvas is already in use"
    if (window.meuGrafico) {
        window.meuGrafico.destroy();
    }

    window.meuGrafico = new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Energia',
                data: [],
                borderColor: '#f1c40f',
                tension: 0.3,
                fill: true,
                backgroundColor: 'rgba(241, 196, 15, 0.1)'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { x: { display: false }, y: { beginAtZero: true } }
        }
    });
}

// Ponte simplificada para o Python
window.atualizarGrafico = function(v) {
    if (window.meuGrafico) {
        window.meuGrafico.data.labels.push("");
        window.meuGrafico.data.datasets[0].data.push(v);
        if (window.meuGrafico.data.labels.length > 10) {
            window.meuGrafico.data.labels.shift();
            window.meuGrafico.data.datasets[0].data.shift();
        }
        window.meuGrafico.update();
    }
};

// Inicializa tudo após o CodePen carregar
setTimeout(montarGrafico, 1500);
